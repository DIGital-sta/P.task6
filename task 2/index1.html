<!DOCTYPE html>
<html>

<head>
    <title>Завдання 2: Тест AND</title>
    <script>
        function checkAnd() {
            var r1 = document.test.ans1.value;
            var r2 = document.test.ans2.value;
            var r3 = document.test.ans3.value;
            var r4 = document.test.ans4.value;

            if (r1 == "0" && r2 == "0" && r3 == "0" && r4 == "1") {
                alert("Правильно! Ви знаєте таблицю істинності AND.");
            } else {
                alert("Помилка. Спробуйте ще раз.");
            }
        }
    </script>
</head>

<body>
    <h2>Тест: Логічне "І" (AND)</h2>
    <form name="test">
        0 AND 0 = <input type="text" name="ans1" size="2"><br>
        0 AND 1 = <input type="text" name="ans2" size="2"><br>
        1 AND 0 = <input type="text" name="ans3" size="2"><br>
        1 AND 1 = <input type="text" name="ans4" size="2"><br><br>
        <input type="button" value="Перевірити" onclick="checkAnd()">
    </form>
</body>

</html>
