<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Завдання 4: Реєстрація</title>
</head>

<body>
    <h2>Реєстрація користувача</h2>
    <form action="index4.html" method="GET">
        <table border="0">
            <tr>
                <td>Логін:</td>
                <td><input type="text" name="login"></td>
            </tr>
            <tr>
                <td>Пароль:</td>
                <td><input type="password" name="pass"></td>
            </tr>
            <tr>
                <td>Прізвище:</td>
                <td><input type="text" name="lastname"></td>
            </tr>
            <tr>
                <td>Стать:</td>
                <td>
                    <input type="radio" name="sex" value="m"> Чол
                    <input type="radio" name="sex" value="f"> Жін
                </td>
            </tr>
            <tr>
                <td>Місто:</td>
                <td>
                    <select name="city">
                        <option>Хмельницький</option>
                        <option>Київ</option>
                        <option>Львів</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><input type="submit" value="Зареєструватися"></td>
                <td><input type="reset" value="Очистити"></td>
            </tr>
        </table>
    </form>
</body>

</html>
